apis:
  - aid: genderize:genderize-api
    name: Genderize.io API
    description: REST API that accepts first names and returns gender predictions (male, female, or null) with probability scores and sample counts. Supports single names, batch requests of up to 10 names, and country-scoped lookups using ISO 3166-1 alpha-2 country codes.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
